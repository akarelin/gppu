name: Version Stamp

on:
  push:
    branches: [master]
    paths:
      - 'gppu/**'
      - 'tests/**'

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[version-stamp]')"

    steps:
      - uses: actions/checkout@v4

      - name: Stamp build date in gppu.py
        run: |
          BUILD=$(date +%y%m%d)
          sed -i "s/^VER_GPPU_BUILD = .*/VER_GPPU_BUILD = '${BUILD}'/" gppu/gppu.py
          BASE=$(grep -oP "(?<=^version = \").*(?=\")" pyproject.toml)
          echo "VERSION=${BASE}.${BUILD}" >> $GITHUB_ENV

      - name: Commit version stamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gppu/gppu.py
          git diff --staged --quiet && echo "No version change" && exit 0
          git commit -m "chore: version stamp ${VERSION} [version-stamp]"
          git push
