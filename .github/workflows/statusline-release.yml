name: Statusline Release

on:
  push:
    tags: ['sl-*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor

permissions:
  contents: write

jobs:
  bump:
    runs-on: [self-hosted, linux]
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'sl-*' --sort=-v:refname | head -1 | sed 's/^sl-//')
          if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
          if [ "${{ inputs.bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          echo "tag=sl-${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    if: always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    needs: bump
    strategy:
      matrix:
        include:
          - runner: [self-hosted, linux]
            artifact: statusline-linux-amd64
            suffix: ""
          - runner: macos-latest
            artifact: statusline-macos-arm64
            suffix: ""
          - runner: windows-latest
            artifact: statusline-windows-amd64.exe
            suffix: ".exe"

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump.outputs.tag || github.ref }}
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller jinja2
          pip install -e .

      - name: Build binary
        run: |
          pyinstaller --onefile --name statusline --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=jinja2 --hidden-import=yaml --collect-all jinja2 --copy-metadata gppu statusline/__main__.py

      - name: Rename artifact
        shell: bash
        run: mv dist/statusline${{ matrix.suffix }} dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [bump, build]
    if: always() && needs.build.result == 'success'
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true

      - name: Update sl-latest tag
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
      - run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag -f sl-latest
          git push -f origin sl-latest
