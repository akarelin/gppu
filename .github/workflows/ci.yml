name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor

permissions:
  contents: write

jobs:
  test:
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        extras: ['', 'pg', 'sql']

    steps:
      - uses: actions/checkout@v4

      - name: Setup venv and install
        run: |
          python3 -m venv .venv
          .venv/bin/pip install PyYAML pytest
          .venv/bin/pip install -e ".${{ matrix.extras && format('[{0}]', matrix.extras) || '' }}"

      - name: Run tests
        run: .venv/bin/python -m pytest tests/ -v

  bump:
    needs: test
    runs-on: [self-hosted, linux]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Bump version
        run: |
          BASE=$(grep -oP "(?<=^version = \").*(?=\")" pyproject.toml)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          if [ "${{ inputs.bump }}" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/^version = .*/version = \"${NEW}\"/" pyproject.toml
          echo "VERSION=${NEW}" >> $GITHUB_ENV
          echo "TAG=v${NEW}" >> $GITHUB_ENV

      - name: Commit and tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git add pyproject.toml
          git commit -m "chore: bump version to ${VERSION} [version-stamp]"
          git tag "${TAG}"
          git push origin master "${TAG}"

      - name: Build package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build
          .venv/bin/python -m build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
          generate_release_notes: true

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest

  stamp:
    needs: test
    runs-on: [self-hosted, linux]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[version-stamp]')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Stamp build number in pyproject.toml
        run: |
          # Get latest version tag (e.g. v2.50.0 → 2.50.0)
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="0.0.0"
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
          PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/^version = .*/version = \"${NEW}\"/" pyproject.toml
          echo "VERSION=${NEW}" >> $GITHUB_ENV

      - name: Commit, tag and push
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git add pyproject.toml
          git diff --staged --quiet && echo "No version change" && exit 0
          git commit -m "chore: version stamp ${VERSION} [version-stamp]"
          git tag "v${VERSION}"
          git push origin master "v${VERSION}"

      - name: Build package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build
          .venv/bin/python -m build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: dist/*
          generate_release_notes: true

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest

  release-dev:
    needs: test
    runs-on: [self-hosted, linux]
    if: github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v4

      - name: Build package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build
          .venv/bin/python -m build

      - name: Create Dev Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev Build (latest)
          files: dist/*
          prerelease: true
          make_latest: false
