name: gppu

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor

permissions:
  contents: write

jobs:
  test:
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        extras: ['', 'pg', 'sql']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup venv and install
        run: |
          python3 -m venv .venv
          .venv/bin/pip install PyYAML pytest setuptools-scm
          .venv/bin/pip install -e ".${{ matrix.extras && format('[{0}]', matrix.extras) || '' }}"

      - name: Run tests
        run: .venv/bin/python -m pytest tests/ -v

  bump:
    needs: test
    runs-on: [self-hosted, linux]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
          if [ "${{ inputs.bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          echo "TAG=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV

      - name: Create tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Build and release
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
          generate_release_notes: true

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest

  stamp:
    needs: test
    runs-on: [self-hosted, linux]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
          PATCH=$((PATCH + 1))
          echo "TAG=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV

      - name: Create tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Build and release
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
          generate_release_notes: true

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest

  release-dev:
    needs: test
    runs-on: [self-hosted, linux]
    if: github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Build package
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Create Dev Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev Build (latest)
          files: dist/*
          prerelease: true
          make_latest: false
