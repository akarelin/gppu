name: CI

on:
  push:
    tags:
      - 'v*'
    branches: [master, dev]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor

permissions:
  contents: write

jobs:
  test:
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
        extras: ['', 'pg', 'sql']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install dependencies
        run: |
          pip install PyYAML pytest
          pip install -e ".${{ matrix.extras && format('[{0}]', matrix.extras) || '' }}"

      - name: Run tests
        run: python -m pytest tests/ -v

  bump:
    needs: test
    runs-on: [self-hosted, linux]
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Bump version
        run: |
          BASE=$(grep -oP "(?<=^version = \").*(?=\")" pyproject.toml)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          if [ "${{ inputs.bump }}" = "major" ]; then
            MAJOR=$((MAJOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/^version = .*/version = \"${NEW}.${{ github.run_number }}\"/" pyproject.toml
          echo "VERSION=${NEW}.${{ github.run_number }}" >> $GITHUB_ENV
          echo "TAG=v${NEW}" >> $GITHUB_ENV

      - name: Commit and tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git add pyproject.toml
          git commit -m "chore: bump version to ${VERSION} [version-stamp]"
          git tag "${TAG}"
          git push origin master "${TAG}"

  stamp:
    needs: test
    runs-on: [self-hosted, linux]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[version-stamp]')

    steps:
      - uses: actions/checkout@v4

      - name: Stamp build number in pyproject.toml
        run: |
          BASE=$(grep -oP "(?<=^version = \").*(?=\")" pyproject.toml)
          IFS='.' read -r MAJOR MINOR PATCH _ <<< "$BASE"
          NEW="${MAJOR}.${MINOR}.${PATCH}.${{ github.run_number }}"
          sed -i "s/^version = .*/version = \"${NEW}\"/" pyproject.toml
          echo "VERSION=${NEW}" >> $GITHUB_ENV

      - name: Commit version stamp
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git add pyproject.toml
          git diff --staged --quiet && echo "No version change" && exit 0
          git commit -m "chore: version stamp ${VERSION} [version-stamp]"
          git push

  release:
    needs: test
    runs-on: [self-hosted, linux]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/dev'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Set dev version suffix
        if: github.ref == 'refs/heads/dev'
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          sed -i "s/^version = .*/version = \"$(grep -oP '(?<=version = \").*(?=\")' pyproject.toml).dev${TIMESTAMP}\"/" pyproject.toml

      - name: Build package
        run: python -m build

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Update latest tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git tag -f latest
          git push -f origin latest


      - name: Create Dev Pre-release
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev Build (latest)
          files: dist/*
          prerelease: true
          make_latest: false
