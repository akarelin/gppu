name: CI

on:
  push:
    tags:
      - 'v*'
    branches: [master, dev, beta]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install PyYAML pytest
          pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v

  stamp:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && !contains(github.event.head_commit.message, '[version-stamp]')

    steps:
      - uses: actions/checkout@v4

      - name: Stamp build date in gppu.py
        run: |
          BUILD=$(date +%y%m%d)
          sed -i "s/^VER_GPPU_BUILD = .*/VER_GPPU_BUILD = '${BUILD}'/" gppu/gppu.py
          BASE=$(grep -oP "(?<=^version = \").*(?=\")" pyproject.toml)
          echo "VERSION=${BASE}.${BUILD}" >> $GITHUB_ENV

      - name: Commit version stamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gppu/gppu.py
          git diff --staged --quiet && echo "No version change" && exit 0
          git commit -m "chore: version stamp ${VERSION} [version-stamp]"
          git push

  release:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/beta'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Set dev version suffix
        if: github.ref == 'refs/heads/dev'
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          sed -i "s/^version = .*/version = \"$(grep -oP '(?<=version = \").*(?=\")' pyproject.toml).dev${TIMESTAMP}\"/" pyproject.toml

      - name: Set beta version suffix
        if: github.ref == 'refs/heads/beta'
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          sed -i "s/^version = .*/version = \"$(grep -oP '(?<=version = \").*(?=\")' pyproject.toml)b${TIMESTAMP}\"/" pyproject.toml

      - name: Build package
        run: python -m build

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Update latest tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Create Beta Pre-release
        if: github.ref == 'refs/heads/beta'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: Beta Build (latest)
          files: dist/*
          prerelease: true
          make_latest: false

      - name: Create Dev Pre-release
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev Build (latest)
          files: dist/*
          prerelease: true
          make_latest: false
