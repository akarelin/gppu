name: W11

on:
  push:
    tags: ['w11/v*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (master: patch/minor, dev: alpha/beta/rc/minor)'
        required: true
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc
          - patch
          - minor

permissions:
  contents: write

jobs:
  bump:
    runs-on: [self-hosted, linux]
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          BUMP="${{ inputs.bump }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$BRANCH" = "master" ]; then
            if [ "$BUMP" != "patch" ] && [ "$BUMP" != "minor" ]; then
              echo "::error::Only patch/minor bumps allowed on master"
              exit 1
            fi
            LATEST_TAG=$(git tag -l 'w11/v*' --sort=-v:refname | grep -E '^w11/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's|^w11/v||')
            if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.1.0"; fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            if [ "$BUMP" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            echo "tag=w11/v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

          elif [ "$BRANCH" = "dev" ]; then
            if [ "$BUMP" = "patch" ]; then
              echo "::error::Use alpha/beta/rc/minor bumps on dev"
              exit 1
            fi
            LATEST_PRE=$(git tag -l 'w11/v0.3.*' --sort=-v:refname | grep -E '^w11/v0\.3\.[0-9]+(a|b|rc)[0-9]+$' | head -1)
            if [ -z "$LATEST_PRE" ]; then
              echo "tag=w11/v0.3.0a1" >> $GITHUB_OUTPUT
            else
              TAG_BODY="${LATEST_PRE#w11/v}"
              BASE=$(echo "$TAG_BODY" | sed -E 's/(a|b|rc)[0-9]+$//')
              SUFFIX_TYPE=$(echo "$TAG_BODY" | sed -E 's/.*[0-9](a|b|rc)[0-9]+$/\1/')
              SUFFIX_NUM=$(echo "$TAG_BODY" | sed -E 's/.*(a|b|rc)([0-9]+)$/\2/')
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

              if [ "$BUMP" = "minor" ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
                echo "tag=w11/v${MAJOR}.${MINOR}.${PATCH}a1" >> $GITHUB_OUTPUT
              elif [ "$BUMP" = "$SUFFIX_TYPE" ]; then
                NEW_NUM=$((SUFFIX_NUM + 1))
                echo "tag=w11/v${BASE}${SUFFIX_TYPE}${NEW_NUM}" >> $GITHUB_OUTPUT
              elif [ "$BUMP" = "alpha" ]; then
                echo "tag=w11/v${BASE}a$((SUFFIX_NUM + 1))" >> $GITHUB_OUTPUT
              elif [ "$BUMP" = "beta" ]; then
                echo "tag=w11/v${BASE}b1" >> $GITHUB_OUTPUT
              elif [ "$BUMP" = "rc" ]; then
                echo "tag=w11/v${BASE}rc1" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Create tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build-windows:
    if: always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    needs: bump
    runs-on: [self-hosted, Windows]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.tag || github.ref }}
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Test w11 launch
        run: |
          pip install textual
          pip install -e .
          python -m w11 --list

      - name: Build binaries
        run: |
          pip install pyinstaller
          pyinstaller --onefile --name w11 --add-data "w11/default_config;default_config" --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=textual --hidden-import=yaml --collect-all textual --copy-metadata gppu w11/__main__.py
          pyinstaller --onefile --name w11-events --add-data "w11/default_config;default_config" --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=textual --hidden-import=yaml --collect-all textual --copy-metadata gppu w11/w11-events.py
          pyinstaller --onefile --name w11-onedrive --add-data "w11/default_config;default_config" --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=textual --hidden-import=yaml --collect-all textual --copy-metadata gppu w11/w11-onedrive.py

      - name: Stage release files
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item dist/w11.exe, dist/w11-events.exe, dist/w11-onedrive.exe -Destination release/
          Copy-Item w11/w11.yaml, w11/w11-events.yaml, w11/w11-onedrive.yaml -Destination release/
          Copy-Item w11/error_rules.yaml, w11/event_categories.yaml -Destination release/
          Compress-Archive -Path release/* -DestinationPath dist/w11-windows-amd64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: w11-windows-amd64
          path: dist/w11-windows-amd64.zip

  release:
    needs: [bump, build-windows]
    if: always() && needs.build-windows.result == 'success'
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute version
        id: version
        run: |
          TAG="${{ needs.bump.outputs.tag || github.ref_name }}"
          echo "clean=${TAG#w11/v}" >> $GITHUB_OUTPUT
          GPPU_VER=$(git describe --tags --match 'gppu/v*' --abbrev=0 2>/dev/null | sed 's|^gppu/||')
          echo "gppu=${GPPU_VER}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag || github.ref_name }}
          name: w11 v${{ steps.version.outputs.clean }}${{ github.ref != 'refs/heads/master' && format(' (gppu {0})', steps.version.outputs.gppu) || '' }}
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ github.ref != 'refs/heads/master' }}

      - name: Update w11/latest release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: w11/latest
          name: w11-latest
          files: artifacts/*
          make_latest: false

      - name: Update w11/latest tag
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag -f w11/latest
          git push -f origin w11/latest

      - name: Update w11/dev-latest tag
        if: github.ref == 'refs/heads/dev'
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag -f w11/dev-latest
          git push -f origin w11/dev-latest
