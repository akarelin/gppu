name: gppu

on:
  pull_request:
    branches: [master]
    paths: ['gppu/**', 'tests/**', 'pyproject.toml', 'setup.cfg']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - none
      run_tests:
        description: 'Run tests before release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  test:
    if: github.event_name == 'pull_request' || inputs.run_tests
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        extras: ['', 'pg', 'sql']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup venv and install
        run: |
          python3 -m venv .venv
          .venv/bin/pip install PyYAML pytest setuptools-scm
          .venv/bin/pip install -e ".${{ matrix.extras && format('[{0}]', matrix.extras) || '' }}"

      - name: Run tests
        run: .venv/bin/python -m pytest tests/ -v

  test-windows:
    if: github.event_name == 'pull_request' || inputs.run_tests
    runs-on: [self-hosted, Windows]
    strategy:
      matrix:
        extras: ['', 'pg', 'sql']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup venv and install
        run: |
          python -m venv .venv
          .venv\Scripts\pip install PyYAML pytest setuptools-scm
          .venv\Scripts\pip install -e ".${{ matrix.extras && format('[{0}]', matrix.extras) || '' }}"

      - name: Run tests
        run: .venv\Scripts\python -m pytest tests/ -v

  release:
    needs: [test, test-windows]
    if: always() && github.event_name == 'workflow_dispatch' && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
          if [ "${{ inputs.bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          echo "TAG=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV

      - name: Create tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Build and release
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
          generate_release_notes: true

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest
