name: gppu

on:
  pull_request:
    branches: [master, dev]
    paths: ['gppu/**', 'tests/**', 'pyproject.toml', 'setup.cfg']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (master: patch/minor, dev: alpha/beta/rc/minor)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - alpha
          - beta
          - rc
          - none
      run_tests:
        description: 'Run tests before release'
        type: boolean
        default: true
      test_windows:
        description: 'Run Windows tests'
        type: boolean
        default: false
      test_sql:
        description: 'Run SQL/PG extra tests'
        type: boolean
        default: false
      test_tui:
        description: 'Run TUI tests'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  matrix:
    runs-on: [self-hosted, linux]
    if: github.event_name == 'pull_request' || inputs.run_tests
    outputs:
      tests: ${{ steps.build.outputs.tests }}
    steps:
      - id: build
        shell: python3 {0}
        run: |
          import json, os

          is_pr = "${{ github.event_name }}" == "pull_request"
          sql = is_pr or "${{ inputs.test_sql }}" == "true"
          win = is_pr or "${{ inputs.test_windows }}" == "true"
          tui = is_pr or "${{ inputs.test_tui }}" == "true"

          L = ["self-hosted", "linux"]
          W = ["self-hosted", "Windows"]
          MAIN = "tests/ --ignore=tests/test_tui.py"

          tests = [
              {"os": "linux", "runner": L, "extras": "", "test_path": MAIN, "label": "linux"},
          ]
          if sql:
              tests += [
                  {"os": "linux", "runner": L, "extras": "[pg]",  "test_path": MAIN, "label": "linux-pg"},
                  {"os": "linux", "runner": L, "extras": "[sql]", "test_path": MAIN, "label": "linux-sql"},
              ]
          if tui:
              tests += [
                  {"os": "linux", "runner": L, "extras": "[test-tui]", "test_path": "tests/test_tui.py", "label": "linux-tui"},
              ]
          if win:
              tests += [
                  {"os": "windows", "runner": W, "extras": "", "test_path": MAIN, "label": "windows"},
              ]
              if sql:
                  tests += [
                      {"os": "windows", "runner": W, "extras": "[pg]",  "test_path": MAIN, "label": "windows-pg"},
                      {"os": "windows", "runner": W, "extras": "[sql]", "test_path": MAIN, "label": "windows-sql"},
                  ]

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"tests={json.dumps(tests)}\n")

  test:
    needs: matrix
    if: needs.matrix.result == 'success'
    name: test (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.tests) }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: matrix.os == 'windows'
        with:
          python-version: '3.13'

      - name: Setup and test (Linux)
        if: matrix.os == 'linux'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install PyYAML pytest setuptools-scm
          .venv/bin/pip install -e ".${{ matrix.extras }}"
          .venv/bin/python -m pytest ${{ matrix.test_path }} -v

      - name: Setup and test (Windows)
        if: matrix.os == 'windows'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install PyYAML pytest setuptools-scm
          .venv\Scripts\pip install -e ".${{ matrix.extras }}"
          .venv\Scripts\python -m pytest ${{ matrix.test_path }} -v

  release:
    needs: [matrix, test]
    if: >-
      always()
      && github.event_name == 'workflow_dispatch'
      && inputs.bump != 'none'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
      && (needs.matrix.result == 'success' || needs.matrix.result == 'skipped')
      && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        run: |
          BUMP="${{ inputs.bump }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$BRANCH" = "master" ]; then
            # Stable release — only patch/minor
            if [ "$BUMP" != "patch" ] && [ "$BUMP" != "minor" ]; then
              echo "::error::Only patch/minor bumps allowed on master"
              exit 1
            fi
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's/^v//')
            if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            if [ "$BUMP" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            echo "TAG=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV

          elif [ "$BRANCH" = "dev" ]; then
            # Pre-release — alpha/beta/rc/minor
            if [ "$BUMP" = "patch" ]; then
              echo "::error::Use alpha/beta/rc/minor bumps on dev"
              exit 1
            fi
            LATEST_PRE=$(git tag -l 'v3.*' --sort=-v:refname | grep -E '^v3\.[0-9]+\.[0-9]+(a|b|rc)[0-9]+$' | head -1)
            if [ -z "$LATEST_PRE" ]; then
              echo "TAG=v3.0.0a1" >> $GITHUB_ENV
            else
              TAG_BODY="${LATEST_PRE#v}"
              BASE=$(echo "$TAG_BODY" | sed -E 's/(a|b|rc)[0-9]+$//')
              SUFFIX_TYPE=$(echo "$TAG_BODY" | sed -E 's/.*[0-9](a|b|rc)[0-9]+$/\1/')
              SUFFIX_NUM=$(echo "$TAG_BODY" | sed -E 's/.*(a|b|rc)([0-9]+)$/\2/')
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

              if [ "$BUMP" = "minor" ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
                echo "TAG=v${MAJOR}.${MINOR}.${PATCH}a1" >> $GITHUB_ENV
              elif [ "$BUMP" = "$SUFFIX_TYPE" ]; then
                NEW_NUM=$((SUFFIX_NUM + 1))
                echo "TAG=v${BASE}${SUFFIX_TYPE}${NEW_NUM}" >> $GITHUB_ENV
              elif [ "$BUMP" = "alpha" ]; then
                echo "TAG=v${BASE}a$((SUFFIX_NUM + 1))" >> $GITHUB_ENV
              elif [ "$BUMP" = "beta" ]; then
                echo "TAG=v${BASE}b1" >> $GITHUB_ENV
              elif [ "$BUMP" = "rc" ]; then
                echo "TAG=v${BASE}rc1" >> $GITHUB_ENV
              fi
            fi
          fi

      - name: Create tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Build and release
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ github.ref == 'refs/heads/dev' }}

      - name: Update latest tag
        if: github.ref == 'refs/heads/master'
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Update dev-latest tag
        if: github.ref == 'refs/heads/dev'
        run: |
          git tag -f dev-latest
          git push -f origin dev-latest
