name: gppu

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. gppu/v3.0.1a1). Leave empty + set bump to create new tag.'
        required: false
        type: string
      bump:
        description: 'Version bump (ignored if tag is set)'
        required: false
        type: choice
        options:
          - none
          - prerelease
          - patch
          - minor
      prerelease:
        description: 'Mark as pre-release (also skips updating gppu/latest)'
        type: boolean
        default: false
      run_tests:
        description: 'Run tests before release'
        type: boolean
        default: true
      test_windows:
        description: 'Run Windows tests'
        type: boolean
        default: false
      test_sql:
        description: 'Run SQL/PG extra tests'
        type: boolean
        default: false
      test_tui:
        description: 'Run TUI tests'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  matrix:
    runs-on: [self-hosted, linux]
    if: inputs.run_tests
    outputs:
      tests: ${{ steps.build.outputs.tests }}
    steps:
      - id: build
        shell: python3 {0}
        run: |
          import json, os

          sql = "${{ inputs.test_sql }}" == "true"
          win = "${{ inputs.test_windows }}" == "true"
          tui = "${{ inputs.test_tui }}" == "true"

          L = ["self-hosted", "linux"]
          W = ["self-hosted", "Windows"]
          MAIN = "tests/ --ignore=tests/test_tui.py"

          tests = [
              {"os": "linux", "runner": L, "extras": "", "test_path": MAIN, "label": "linux"},
          ]
          if sql:
              tests += [
                  {"os": "linux", "runner": L, "extras": "[pg]",  "test_path": MAIN, "label": "linux-pg"},
                  {"os": "linux", "runner": L, "extras": "[sql]", "test_path": MAIN, "label": "linux-sql"},
              ]
          if tui:
              tests += [
                  {"os": "linux", "runner": L, "extras": "[test-tui]", "test_path": "tests/test_tui.py", "label": "linux-tui"},
              ]
          if win:
              tests += [
                  {"os": "windows", "runner": W, "extras": "", "test_path": MAIN, "label": "windows"},
              ]
              if sql:
                  tests += [
                      {"os": "windows", "runner": W, "extras": "[pg]",  "test_path": MAIN, "label": "windows-pg"},
                      {"os": "windows", "runner": W, "extras": "[sql]", "test_path": MAIN, "label": "windows-sql"},
                  ]

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"tests={json.dumps(tests)}\n")

  test:
    needs: matrix
    if: needs.matrix.result == 'success'
    name: test (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.tests) }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: matrix.os == 'windows'
        with:
          python-version: '3.13'

      - name: Setup and test (Linux)
        if: matrix.os == 'linux'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install PyYAML pytest setuptools-scm
          .venv/bin/pip install -e ".${{ matrix.extras }}"
          .venv/bin/python -m pytest ${{ matrix.test_path }} -v

      - name: Setup and test (Windows)
        if: matrix.os == 'windows'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install PyYAML pytest setuptools-scm
          .venv\Scripts\pip install -e ".${{ matrix.extras }}"
          .venv\Scripts\python -m pytest ${{ matrix.test_path }} -v

  release:
    needs: [matrix, test]
    if: >-
      always()
      && (needs.matrix.result == 'success' || needs.matrix.result == 'skipped')
      && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Resolve tag
        shell: python3 {0}
        run: |
          import re, subprocess, os

          tag_input = "${{ inputs.tag }}"
          bump = "${{ inputs.bump }}"

          tags = subprocess.check_output(
              ["git", "tag", "-l", "gppu/v*", "--sort=-v:refname"],
              text=True
          ).strip().splitlines()

          def write(k, v):
              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write(f"{k}={v}\n")

          if tag_input:
              write("TAG", tag_input)
              write("TAG_EXISTS", "true")
          elif bump == "prerelease":
              # Find latest prerelease tag: gppu/v1.2.3a4, gppu/v1.2.3b1, gppu/v1.2.3rc2
              pat = re.compile(r'^gppu/v(\d+\.\d+\.\d+)(a|b|rc)(\d+)$')
              for t in tags:
                  m = pat.match(t)
                  if m:
                      base, suffix, num = m.group(1), m.group(2), int(m.group(3))
                      write("TAG", f"gppu/v{base}{suffix}{num + 1}")
                      write("TAG_EXISTS", "false")
                      break
              else:
                  raise SystemExit("No prerelease tag found to increment")
          elif bump in ("patch", "minor"):
              pat = re.compile(r'^gppu/v(\d+)\.(\d+)\.(\d+)$')
              for t in tags:
                  m = pat.match(t)
                  if m:
                      major, minor, patch = int(m.group(1)), int(m.group(2)), int(m.group(3))
                      if bump == "minor":
                          minor += 1; patch = 0
                      else:
                          patch += 1
                      write("TAG", f"gppu/v{major}.{minor}.{patch}")
                      write("TAG_EXISTS", "false")
                      break
              else:
                  write("TAG", "gppu/v0.0.1")
                  write("TAG_EXISTS", "false")
          else:
              write("TAG", tags[0] if tags else "")
              write("TAG_EXISTS", "true")

      - name: Create tag
        if: env.TAG_EXISTS == 'false'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Checkout tag
        if: env.TAG_EXISTS == 'true'
        run: git checkout "${TAG}"

      - name: Build and release
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Compute release name
        run: echo "VERSION=${TAG#gppu/v}" >> $GITHUB_ENV

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FLAGS=(--title "gppu v${VERSION}" --generate-notes)
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then FLAGS+=(--prerelease); fi
          gh release create "${TAG}" dist/* "${FLAGS[@]}"

      - name: Update gppu/latest tag
        if: ${{ inputs.prerelease == false }}
        run: |
          git tag -f gppu/latest
          git push -f origin gppu/latest
