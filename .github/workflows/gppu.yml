name: gppu

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. gppu/v3.0.1a1). Leave empty + set bump to create new tag.'
        required: false
        type: string
      bump:
        description: 'Version bump (ignored if tag is set)'
        required: false
        type: choice
        options:
          - none
          - patch
          - minor
      run_tests:
        description: 'Run tests before release'
        type: boolean
        default: true
      test_windows:
        description: 'Run Windows tests'
        type: boolean
        default: false
      test_sql:
        description: 'Run SQL/PG extra tests'
        type: boolean
        default: false
      test_tui:
        description: 'Run TUI tests'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  matrix:
    runs-on: [self-hosted, linux]
    if: inputs.run_tests
    outputs:
      tests: ${{ steps.build.outputs.tests }}
    steps:
      - id: build
        shell: python3 {0}
        run: |
          import json, os

          sql = "${{ inputs.test_sql }}" == "true"
          win = "${{ inputs.test_windows }}" == "true"
          tui = "${{ inputs.test_tui }}" == "true"

          L = ["self-hosted", "linux"]
          W = ["self-hosted", "Windows"]
          MAIN = "tests/ --ignore=tests/test_tui.py"

          tests = [
              {"os": "linux", "runner": L, "extras": "", "test_path": MAIN, "label": "linux"},
          ]
          if sql:
              tests += [
                  {"os": "linux", "runner": L, "extras": "[pg]",  "test_path": MAIN, "label": "linux-pg"},
                  {"os": "linux", "runner": L, "extras": "[sql]", "test_path": MAIN, "label": "linux-sql"},
              ]
          if tui:
              tests += [
                  {"os": "linux", "runner": L, "extras": "[test-tui]", "test_path": "tests/test_tui.py", "label": "linux-tui"},
              ]
          if win:
              tests += [
                  {"os": "windows", "runner": W, "extras": "", "test_path": MAIN, "label": "windows"},
              ]
              if sql:
                  tests += [
                      {"os": "windows", "runner": W, "extras": "[pg]",  "test_path": MAIN, "label": "windows-pg"},
                      {"os": "windows", "runner": W, "extras": "[sql]", "test_path": MAIN, "label": "windows-sql"},
                  ]

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"tests={json.dumps(tests)}\n")

  test:
    needs: matrix
    if: needs.matrix.result == 'success'
    name: test (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.tests) }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: matrix.os == 'windows'
        with:
          python-version: '3.13'

      - name: Setup and test (Linux)
        if: matrix.os == 'linux'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install PyYAML pytest setuptools-scm
          .venv/bin/pip install -e ".${{ matrix.extras }}"
          .venv/bin/python -m pytest ${{ matrix.test_path }} -v

      - name: Setup and test (Windows)
        if: matrix.os == 'windows'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install PyYAML pytest setuptools-scm
          .venv\Scripts\pip install -e ".${{ matrix.extras }}"
          .venv\Scripts\python -m pytest ${{ matrix.test_path }} -v

  release:
    needs: [matrix, test]
    if: >-
      always()
      && (needs.matrix.result == 'success' || needs.matrix.result == 'skipped')
      && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Resolve tag
        run: |
          INPUT_TAG="${{ inputs.tag }}"
          BUMP="${{ inputs.bump }}"
          if [[ -n "$INPUT_TAG" ]]; then
            echo "TAG=${INPUT_TAG}" >> $GITHUB_ENV
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          elif [[ "$BUMP" != "none" ]]; then
            LATEST_TAG=$(git tag -l 'gppu/v*' --sort=-v:refname | grep -E '^gppu/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's|^gppu/v||')
            if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            if [ "$BUMP" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            echo "TAG=gppu/v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          else
            LATEST_TAG=$(git tag -l 'gppu/v*' --sort=-v:refname | head -1)
            echo "TAG=${LATEST_TAG}" >> $GITHUB_ENV
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          fi

      - name: Create tag
        if: env.TAG_EXISTS == 'false'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Checkout tag
        if: env.TAG_EXISTS == 'true'
        run: git checkout "${TAG}"

      - name: Build and release
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Compute release name
        run: echo "VERSION=${TAG#gppu/v}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: gppu v${{ env.VERSION }}
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(env.VERSION, 'a') || contains(env.VERSION, 'b') || contains(env.VERSION, 'rc') }}

      - name: Update gppu/latest tag
        if: ${{ !contains(env.VERSION, 'a') && !contains(env.VERSION, 'b') && !contains(env.VERSION, 'rc') }}
        run: |
          git tag -f gppu/latest
          git push -f origin gppu/latest
