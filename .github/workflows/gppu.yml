name: gppu

on:
  pull_request:
    branches: [master]
    paths: ['gppu/**', 'tests/**', 'pyproject.toml', 'setup.cfg']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
      run_tests:
        description: 'Run tests before release'
        type: boolean
        default: true
      test_windows:
        description: 'Run Windows tests'
        type: boolean
        default: false
      test_sql:
        description: 'Run SQL/PG extra tests'
        type: boolean
        default: false
      test_tui:
        description: 'Run TUI tests'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  matrix:
    runs-on: [self-hosted, linux]
    if: github.event_name == 'pull_request' || inputs.run_tests
    outputs:
      tests: ${{ steps.build.outputs.tests }}
    steps:
      - id: build
        shell: python3 {0}
        run: |
          import json, os

          is_pr = "${{ github.event_name }}" == "pull_request"
          sql = is_pr or "${{ inputs.test_sql }}" == "true"
          win = is_pr or "${{ inputs.test_windows }}" == "true"
          tui = is_pr or "${{ inputs.test_tui }}" == "true"

          L = ["self-hosted", "linux"]
          W = ["self-hosted", "Windows"]
          MAIN = "tests/ --ignore=tests/test_tui.py"

          tests = [
              {"os": "linux", "runner": L, "extras": "", "test_path": MAIN, "label": "linux"},
          ]
          if sql:
              tests += [
                  {"os": "linux", "runner": L, "extras": "[pg]",  "test_path": MAIN, "label": "linux-pg"},
                  {"os": "linux", "runner": L, "extras": "[sql]", "test_path": MAIN, "label": "linux-sql"},
              ]
          if tui:
              tests += [
                  {"os": "linux", "runner": L, "extras": "[test-tui]", "test_path": "tests/test_tui.py", "label": "linux-tui"},
              ]
          if win:
              tests += [
                  {"os": "windows", "runner": W, "extras": "", "test_path": MAIN, "label": "windows"},
              ]
              if sql:
                  tests += [
                      {"os": "windows", "runner": W, "extras": "[pg]",  "test_path": MAIN, "label": "windows-pg"},
                      {"os": "windows", "runner": W, "extras": "[sql]", "test_path": MAIN, "label": "windows-sql"},
                  ]

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"tests={json.dumps(tests)}\n")

  test:
    needs: matrix
    if: needs.matrix.result == 'success'
    name: test (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix.outputs.tests) }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: matrix.os == 'windows'
        with:
          python-version: '3.13'

      - name: Setup and test (Linux)
        if: matrix.os == 'linux'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install PyYAML pytest setuptools-scm
          .venv/bin/pip install -e ".${{ matrix.extras }}"
          .venv/bin/python -m pytest ${{ matrix.test_path }} -v

      - name: Setup and test (Windows)
        if: matrix.os == 'windows'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install PyYAML pytest setuptools-scm
          .venv\Scripts\pip install -e ".${{ matrix.extras }}"
          .venv\Scripts\python -m pytest ${{ matrix.test_path }} -v

  release:
    needs: [matrix, test]
    if: >-
      always()
      && github.event_name == 'workflow_dispatch'
      && github.ref == 'refs/heads/master'
      && (needs.matrix.result == 'success' || needs.matrix.result == 'skipped')
      && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute version
        run: |
          BUMP="${{ inputs.bump }}"
          LATEST_TAG=$(git tag -l 'gppu/v*' --sort=-v:refname | grep -E '^gppu/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's|^gppu/v||')
          if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
          if [ "$BUMP" = "none" ]; then
            echo "TAG=gppu/v${LATEST_TAG}" >> $GITHUB_ENV
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            if [ "$BUMP" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            echo "TAG=gppu/v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV
          fi

      - name: Create tag
        if: inputs.bump != 'none'
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Checkout tag for rebuild
        if: inputs.bump == 'none'
        run: git checkout "${TAG}"

      - name: Build and release
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Compute release name
        run: echo "VERSION=${TAG#gppu/v}" >> $GITHUB_ENV

      - name: Create Release
        if: inputs.bump != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: gppu v${{ env.VERSION }}
          files: dist/*
          generate_release_notes: true

      - name: Upload assets to existing release
        if: inputs.bump == 'none'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${TAG}" dist/* --clobber

      - name: Update gppu/latest tag
        run: |
          git tag -f gppu/latest
          git push -f origin gppu/latest
