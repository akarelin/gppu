name: gppu

on:
  pull_request:
    branches: [master, dev]
    paths: ['gppu/**', 'tests/**', 'pyproject.toml', 'setup.cfg']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (master: patch/minor, dev: alpha/beta/rc/minor)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - alpha
          - beta
          - rc
          - none
      run_tests:
        description: 'Run tests before release'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  test:
    if: github.event_name == 'pull_request' || inputs.run_tests
    runs-on: [self-hosted, linux]
    strategy:
      matrix:
        extras: ['', 'pg', 'sql']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup venv and install
        run: |
          python3 -m venv .venv
          .venv/bin/pip install PyYAML pytest setuptools-scm
          .venv/bin/pip install -e ".${{ matrix.extras && format('[{0}]', matrix.extras) || '' }}"

      - name: Run tests
        run: .venv/bin/python -m pytest tests/ -v --ignore=tests/test_tui.py

  test-tui:
    if: github.event_name == 'pull_request' || inputs.run_tests
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Setup venv and install
        run: |
          python3 -m venv .venv
          .venv/bin/pip install setuptools-scm
          .venv/bin/pip install -e ".[test-tui]"

      - name: Run TUI tests
        run: .venv/bin/python -m pytest tests/test_tui.py -v

  test-windows:
    if: github.event_name == 'pull_request' || inputs.run_tests
    runs-on: [self-hosted, Windows]
    strategy:
      matrix:
        extras: ['', 'pg', 'sql']

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup venv and install
        run: |
          python -m venv .venv
          .venv\Scripts\pip install PyYAML pytest setuptools-scm
          .venv\Scripts\pip install -e ".${{ matrix.extras && format('[{0}]', matrix.extras) || '' }}"

      - name: Run tests
        run: .venv\Scripts\python -m pytest tests/ -v --ignore=tests/test_tui.py

  release:
    needs: [test, test-tui, test-windows]
    if: >-
      always()
      && github.event_name == 'workflow_dispatch'
      && inputs.bump != 'none'
      && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
      && (needs.test.result == 'success' || needs.test.result == 'skipped')
      && (needs.test-tui.result == 'success' || needs.test-tui.result == 'skipped')
      && (needs.test-windows.result == 'success' || needs.test-windows.result == 'skipped')
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        run: |
          BUMP="${{ inputs.bump }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$BRANCH" = "master" ]; then
            # Stable release — only patch/minor
            if [ "$BUMP" != "patch" ] && [ "$BUMP" != "minor" ]; then
              echo "::error::Only patch/minor bumps allowed on master"
              exit 1
            fi
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's/^v//')
            if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            if [ "$BUMP" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            echo "TAG=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_ENV

          elif [ "$BRANCH" = "dev" ]; then
            # Pre-release — alpha/beta/rc/minor
            if [ "$BUMP" = "patch" ]; then
              echo "::error::Use alpha/beta/rc/minor bumps on dev"
              exit 1
            fi
            LATEST_PRE=$(git tag -l 'v3.*' --sort=-v:refname | grep -E '^v3\.[0-9]+\.[0-9]+(a|b|rc)[0-9]+$' | head -1)
            if [ -z "$LATEST_PRE" ]; then
              echo "TAG=v3.0.0a1" >> $GITHUB_ENV
            else
              TAG_BODY="${LATEST_PRE#v}"
              BASE=$(echo "$TAG_BODY" | sed -E 's/(a|b|rc)[0-9]+$//')
              SUFFIX_TYPE=$(echo "$TAG_BODY" | sed -E 's/.*[0-9](a|b|rc)[0-9]+$/\1/')
              SUFFIX_NUM=$(echo "$TAG_BODY" | sed -E 's/.*(a|b|rc)([0-9]+)$/\2/')
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

              if [ "$BUMP" = "minor" ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
                echo "TAG=v${MAJOR}.${MINOR}.${PATCH}a1" >> $GITHUB_ENV
              elif [ "$BUMP" = "$SUFFIX_TYPE" ]; then
                NEW_NUM=$((SUFFIX_NUM + 1))
                echo "TAG=v${BASE}${SUFFIX_TYPE}${NEW_NUM}" >> $GITHUB_ENV
              elif [ "$BUMP" = "alpha" ]; then
                echo "TAG=v${BASE}a$((SUFFIX_NUM + 1))" >> $GITHUB_ENV
              elif [ "$BUMP" = "beta" ]; then
                echo "TAG=v${BASE}b1" >> $GITHUB_ENV
              elif [ "$BUMP" = "rc" ]; then
                echo "TAG=v${BASE}rc1" >> $GITHUB_ENV
              fi
            fi
          fi

      - name: Create tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Build and release
        run: |
          python3 -m venv .venv
          .venv/bin/pip install build setuptools-scm
          .venv/bin/python -m build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ github.ref == 'refs/heads/dev' }}

      - name: Update latest tag
        if: github.ref == 'refs/heads/master'
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Update dev-latest tag
        if: github.ref == 'refs/heads/dev'
        run: |
          git tag -f dev-latest
          git push -f origin dev-latest
