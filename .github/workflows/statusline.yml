name: Statusline

on:
  push:
    tags: ['statusline/v*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: false
        type: choice
        options:
          - patch
          - minor
          - none

permissions:
  contents: write

jobs:
  bump:
    runs-on: [self-hosted, linux]
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'statusline/v*' --sort=-v:refname | head -1 | sed 's|^statusline/v||')
          if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
          if [ "${{ inputs.bump }}" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          echo "tag=statusline/v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build-linux:
    if: always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    needs: bump
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.tag || github.ref }}
          fetch-tags: true
          fetch-depth: 0

      - name: Build binary
        run: |
          python3 -m venv .venv
          .venv/bin/pip install pyinstaller jinja2
          .venv/bin/pip install -e .
          .venv/bin/pyinstaller --onefile --name statusline --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=jinja2 --hidden-import=yaml --collect-all jinja2 --copy-metadata gppu statusline/__main__.py
          mv dist/statusline dist/statusline-linux-amd64

      - uses: actions/upload-artifact@v7
        with:
          name: statusline-linux-amd64
          path: dist/statusline-linux-amd64

  build-macos:
    if: always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    needs: bump
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.tag || github.ref }}
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build binary
        run: |
          pip install pyinstaller jinja2
          pip install -e .
          pyinstaller --onefile --name statusline --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=jinja2 --hidden-import=yaml --collect-all jinja2 --copy-metadata gppu statusline/__main__.py
          mv dist/statusline dist/statusline-macos-arm64

      - uses: actions/upload-artifact@v7
        with:
          name: statusline-macos-arm64
          path: dist/statusline-macos-arm64

  build-windows:
    if: always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    needs: bump
    runs-on: [self-hosted, Windows]

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.tag || github.ref }}
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build binary
        run: |
          pip install pyinstaller jinja2
          pip install -e .
          pyinstaller --onefile --name statusline --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=jinja2 --hidden-import=yaml --collect-all jinja2 --copy-metadata gppu statusline/__main__.py

      - name: Rename artifact
        run: Move-Item dist/statusline.exe dist/statusline-windows-amd64.exe

      - uses: actions/upload-artifact@v7
        with:
          name: statusline-windows-amd64.exe
          path: dist/statusline-windows-amd64.exe

  release:
    needs: [bump, build-linux, build-macos, build-windows]
    if: always() && needs.build-linux.result == 'success' && needs.build-macos.result == 'success' && needs.build-windows.result == 'success'
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute version
        id: version
        run: |
          TAG="${{ needs.bump.outputs.tag || github.ref_name }}"
          echo "clean=${TAG#statusline/v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag || github.ref_name }}
          name: statusline ${{ steps.version.outputs.clean }}
          files: artifacts/*
          generate_release_notes: true

      - name: Update statusline/latest tag
        uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0
      - run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag -f statusline/latest
          git push -f origin statusline/latest
