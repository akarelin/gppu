name: Statusline

on:
  push:
    tags: ['statusline/v*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (master: patch/minor, dev: alpha/beta/rc/minor)'
        required: true
        type: choice
        options:
          - none
          - alpha
          - beta
          - rc
          - patch
          - minor

permissions:
  contents: write

jobs:
  bump:
    runs-on: [self-hosted, linux]
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          BUMP="${{ inputs.bump }}"
          BRANCH="${GITHUB_REF#refs/heads/}"

          if [ "$BRANCH" = "master" ]; then
            if [ "$BUMP" != "patch" ] && [ "$BUMP" != "minor" ]; then
              echo "::error::Only patch/minor bumps allowed on master"
              exit 1
            fi
            LATEST_TAG=$(git tag -l 'statusline/v*' --sort=-v:refname | grep -E '^statusline/v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's|^statusline/v||')
            if [ -z "$LATEST_TAG" ]; then LATEST_TAG="0.0.0"; fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST_TAG"
            if [ "$BUMP" = "minor" ]; then
              MINOR=$((MINOR + 1))
              PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            echo "tag=statusline/v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT

          elif [ "$BRANCH" = "dev" ]; then
            if [ "$BUMP" = "patch" ]; then
              echo "::error::Use alpha/beta/rc/minor bumps on dev"
              exit 1
            fi
            LATEST_PRE=$(git tag -l 'statusline/v0.5.*' --sort=-v:refname | grep -E '^statusline/v0\.5\.[0-9]+(a|b|rc)[0-9]+$' | head -1)
            if [ -z "$LATEST_PRE" ]; then
              echo "tag=statusline/v0.5.0a1" >> $GITHUB_OUTPUT
            else
              TAG_BODY="${LATEST_PRE#statusline/v}"
              BASE=$(echo "$TAG_BODY" | sed -E 's/(a|b|rc)[0-9]+$//')
              SUFFIX_TYPE=$(echo "$TAG_BODY" | sed -E 's/.*[0-9](a|b|rc)[0-9]+$/\1/')
              SUFFIX_NUM=$(echo "$TAG_BODY" | sed -E 's/.*(a|b|rc)([0-9]+)$/\2/')
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

              if [ "$BUMP" = "minor" ]; then
                MINOR=$((MINOR + 1))
                PATCH=0
                echo "tag=statusline/v${MAJOR}.${MINOR}.${PATCH}a1" >> $GITHUB_OUTPUT
              elif [ "$BUMP" = "$SUFFIX_TYPE" ]; then
                NEW_NUM=$((SUFFIX_NUM + 1))
                echo "tag=statusline/v${BASE}${SUFFIX_TYPE}${NEW_NUM}" >> $GITHUB_OUTPUT
              elif [ "$BUMP" = "alpha" ]; then
                echo "tag=statusline/v${BASE}a$((SUFFIX_NUM + 1))" >> $GITHUB_OUTPUT
              elif [ "$BUMP" = "beta" ]; then
                echo "tag=statusline/v${BASE}b1" >> $GITHUB_OUTPUT
              elif [ "$BUMP" = "rc" ]; then
                echo "tag=statusline/v${BASE}rc1" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Create tag
        run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    if: always() && (needs.bump.result == 'success' || needs.bump.result == 'skipped')
    needs: bump
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: [self-hosted, linux]
            artifact: statusline-linux-amd64
            ext: ''
          - os: macos
            runner: macos-latest
            artifact: statusline-macos-arm64
            ext: ''
          - os: windows
            runner: [self-hosted, Windows]
            artifact: statusline-windows-amd64.exe
            ext: '.exe'
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.tag || github.ref }}
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/setup-python@v6
        if: matrix.os != 'linux'
        with:
          python-version: '3.12'

      - name: Build binary (Linux)
        if: matrix.os == 'linux'
        run: |
          python3 -m venv .venv
          .venv/bin/pip install pyinstaller jinja2
          .venv/bin/pip install -e .
          .venv/bin/pyinstaller --onefile --name statusline --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=jinja2 --hidden-import=yaml --collect-all jinja2 --copy-metadata gppu statusline/__main__.py

      - name: Build binary
        if: matrix.os != 'linux'
        run: |
          pip install pyinstaller jinja2
          pip install -e .
          pyinstaller --onefile --name statusline --hidden-import=gppu --hidden-import=gppu.gppu --hidden-import=gppu.ad --hidden-import=jinja2 --hidden-import=yaml --collect-all jinja2 --copy-metadata gppu statusline/__main__.py

      - name: Rename artifact
        if: matrix.os != 'windows'
        run: mv dist/statusline dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows'
        run: Move-Item dist/statusline.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [bump, build]
    if: always() && needs.build.result == 'success'
    runs-on: [self-hosted, linux]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute version
        id: version
        run: |
          TAG="${{ needs.bump.outputs.tag || github.ref_name }}"
          echo "clean=${TAG#statusline/v}" >> $GITHUB_OUTPUT
          GPPU_VER=$(git describe --tags --match 'gppu/v*' --abbrev=0 2>/dev/null | sed 's|^gppu/||')
          echo "gppu=${GPPU_VER}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag || github.ref_name }}
          name: statusline v${{ steps.version.outputs.clean }}${{ github.ref != 'refs/heads/master' && format(' (gppu {0})', steps.version.outputs.gppu) || '' }}
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ github.ref != 'refs/heads/master' }}

      - run: |
          git config user.name "Alex AI Actions"
          git config user.email "actions@karelin.ai"
          git tag -f statusline/latest
          git push -f origin statusline/latest
