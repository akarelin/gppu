name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - dev
      - beta

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build

      - name: Set dev version suffix
        if: github.ref == 'refs/heads/dev'
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          sed -i "s/^version = .*/version = \"$(grep -oP '(?<=version = \").*(?=\")' pyproject.toml).dev${TIMESTAMP}\"/" pyproject.toml

      - name: Set beta version suffix
        if: github.ref == 'refs/heads/beta'
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          sed -i "s/^version = .*/version = \"$(grep -oP '(?<=version = \").*(?=\")' pyproject.toml)b${TIMESTAMP}\"/" pyproject.toml

      - name: Build package
        run: python -m build

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Update latest tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Create Beta Pre-release
        if: github.ref == 'refs/heads/beta'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: beta
          name: Beta Build (latest)
          files: dist/*
          prerelease: true
          make_latest: false

      - name: Create Dev Pre-release
        if: github.ref == 'refs/heads/dev'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Dev Build (latest)
          files: dist/*
          prerelease: true
          make_latest: false
